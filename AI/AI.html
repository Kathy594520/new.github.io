  <style>
    body {
      font-family: 'Microsoft JhengHei', Arial, sans-serif;
      background: #f7f9fb;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      text-align: center;
      background: #1d4e89;
      color: #fff;
      padding: 30px 10px;
      box-sizing: border-box;
    }
    header h1 {
      margin: 0;
      font-size: 2em;
    }
    /* 導覽列優化：自動換行、增加點擊範圍 */
    .nav-links {
      margin-top: 15px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    .nav-links a {
      color: #ffe07a;
      text-decoration: none;
      font-weight: bold;
      padding: 5px 10px;
      border-radius: 5px;
      transition: background 0.3s;
    }
    .nav-links a:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    /* 搜尋列樣式 */
    .search-container {
      margin-top: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
    }
    #searchInput {
      width: 90%;
      max-width: 400px;
      padding: 12px 20px;
      font-size: 1em;
      border: none;
      border-radius: 25px;
      outline: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: box-shadow 0.3s;
    }
    #searchInput:focus {
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }
    .container {
      max-width: 1000px;
      width: 95%;
      background: #fff;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      box-sizing: border-box;
    }
    .section-title {
      font-size: 1.5em;
      color: #1d4e89;
      margin: 10px 0 20px;
      border-left: 5px solid #1d4e89;
      padding-left: 10px;
    }
    .subsection-title {
      font-size: 1.1em;
      color: #555;
      margin: 25px 0 10px;
      font-weight: bold;
      border-bottom: 2px dashed #ddd;
      padding-bottom: 5px;
      width: 100%;
    }
    /* 按鈕網格優化：最小寬度縮小，適應小螢幕手機 */
    .buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .buttons a {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px 10px;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      text-align: center;
      transition: opacity 0.3s, transform 0.2s;
      font-size: 0.95em;
      line-height: 1.3;
      min-height: 50px;
    }
    .buttons a:hover {
      opacity: 0.8;
      transform: translateY(-2px);
    }
    
    /* 返回最上方按鈕樣式 */
    #backToTopBtn {
      display: none; /* 預設隱藏 */
      position: fixed;
      bottom: 25px;
      right: 25px;
      z-index: 99;
      font-size: 24px;
      border: none;
      outline: none;
      background-color: #ff9f1c; /* 搭配你網站的橘黃色系 */
      color: white;
      cursor: pointer;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      transition: background-color 0.3s, transform 0.2s;
    }
    #backToTopBtn:hover {
      background-color: #ff595e; /* hover 時變紅色 */
      transform: scale(1.1);
    }
  </style>
</head>
